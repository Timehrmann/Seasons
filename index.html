<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Seasons — Art Deco</title>
  <meta name="description" content="An Art Deco sacred-geometry illustration cycling through the four seasons — Frühling, Summer, Autumn, Winter.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    /* ── Register custom properties so they can be transitioned ── */
    @property --bg  { syntax:'<color>'; inherits:true; initial-value:#EDE5F3; }
    @property --line { syntax:'<color>'; inherits:true; initial-value:#4A7A52; }
    @property --accent { syntax:'<color>'; inherits:true; initial-value:#B5A8CC; }

    *{ margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg: #EDE5F3;
      --line: #4A7A52;
      --accent: #B5A8CC;
      transition: --bg 0.8s ease, --line 0.8s ease, --accent 0.8s ease;
    }

    html, body {
      width:100vw; height:100vh;
      overflow:hidden;
      cursor:pointer;
      background:var(--bg);
    }

    /* ── SVG fills the viewport ── */
    svg.scene {
      position:fixed; top:0; left:0;
      width:100vw; height:100vh;
      display:block;
    }

    /* ── SVG color utility classes ── */
    .f-bg   { fill:var(--bg); }
    .f-line { fill:var(--line); }
    .f-acc  { fill:var(--accent); }
    .s-line { stroke:var(--line); fill:none; }
    .fs-line{ fill:var(--bg); stroke:var(--line); }

    /* ── Seasonal layer visibility ── */
    .season-layer {
      opacity:0;
      transition: opacity 0.8s ease;
      pointer-events:none;
    }
    .season-layer.active { opacity:1; }

    /* ── Season label ── */
    .season-label {
      position:fixed;
      bottom: 48px;
      left:50%;
      transform:translateX(-50%);
      font-family:'Josefin Sans', sans-serif;
      font-weight:300;
      font-size: clamp(16px, 2.4vw, 26px);
      letter-spacing:0.45em;
      text-transform:uppercase;
      color:var(--line);
      z-index:10;
      pointer-events:none;
      transition: opacity 0.45s ease;
    }

    /* ── Next-season arrow ── */
    .next-btn {
      position:fixed;
      bottom:22px; right:28px;
      background:none;
      border:1.5px solid var(--line);
      color:var(--line);
      font-family:'Josefin Sans', sans-serif;
      font-size:16px;
      padding:6px 13px;
      cursor:pointer;
      opacity:0.45;
      transition: opacity 0.3s;
      z-index:10;
      border-radius:0;
    }
    .next-btn:hover { opacity:1; }
  </style>
</head>

<!-- Season label -->

<!-- Next-season arrow button -->
<button class="next-btn" id="nextBtn" aria-label="Next season">&#x2192;</button>

<!-- ═══════════════════════ LOGIC ═══════════════════════ -->
<script>
const SEASONS = [
  { id:'spring', name:'Frühling', bg:'#EDE5F3', line:'#4A7A52', accent:'#B5A8CC' },
  { id:'summer', name:'Summer',   bg:'#F5EFDD', line:'#0D4449', accent:'#D6CBB0' },
  { id:'autumn', name:'Autumn',   bg:'#B87218', line:'#4A1520', accent:'#8F5815' },
  { id:'winter', name:'Winter',   bg:'#161636', line:'#D0D8E8', accent:'#1E1E4A' }
];

let idx = 0;
const root  = document.documentElement;
const label = document.getElementById('seasonLabel');
const layers = document.querySelectorAll('.season-layer');

function apply(i) {
  const s = SEASONS[i];
  root.style.setProperty('--bg',     s.bg);
  root.style.setProperty('--line',   s.line);
  root.style.setProperty('--accent', s.accent);

  layers.forEach(l => l.classList.toggle('active', l.dataset.season === s.id));

  label.style.opacity = '0';
  setTimeout(() => { label.textContent = s.name; label.style.opacity = '1'; }, 380);
}

function next() { idx = (idx + 1) % SEASONS.length; apply(idx); }

document.body.addEventListener('click', e => { if (e.target.id !== 'nextBtn') next(); });
document.getElementById('nextBtn').addEventListener('click', e => { e.stopPropagation(); next(); });
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); idx = (idx + SEASONS.length - 1) % SEASONS.length; apply(idx); }
});

apply(0);
</script>
